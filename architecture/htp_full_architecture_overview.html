<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTP Full Architecture Overview</title>
<style>
  body { margin: 0; background: #fff; font-family: sans-serif; }
  svg { display: block; width: 100%; height: auto; }
  .node { cursor: pointer; }
  .node:hover { opacity: 0.85; }
  .th { font-size: 14px; font-weight: 500; fill: inherit; }
  .ts { font-size: 12px; fill: inherit; }

  /* c-purple */
  .c-purple > rect, .c-purple > ellipse, .c-purple > circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text, .c-purple .th { fill: #26215C; }
  .c-purple .ts { fill: #534AB7; }

  /* c-teal */
  .c-teal > rect, .c-teal > ellipse, .c-teal > circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text, .c-teal .th { fill: #04342C; }
  .c-teal .ts { fill: #0F6E56; }

  /* c-coral */
  .c-coral > rect, .c-coral > ellipse, .c-coral > circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text, .c-coral .th { fill: #4A1B0C; }
  .c-coral .ts { fill: #993C1D; }

  /* c-amber */
  .c-amber > rect, .c-amber > ellipse, .c-amber > circle { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text, .c-amber .th { fill: #412402; }
  .c-amber .ts { fill: #854F0B; }

  /* c-blue */
  .c-blue > rect, .c-blue > ellipse, .c-blue > circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text, .c-blue .th { fill: #042C53; }
  .c-blue .ts { fill: #185FA5; }

  /* c-gray */
  .c-gray > rect, .c-gray > ellipse, .c-gray > circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray > text, .c-gray .th { fill: #2C2C2A; }
  .c-gray .ts { fill: #5F5E5A; }

  /* c-green */
  .c-green > rect, .c-green > ellipse, .c-green > circle { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green > text, .c-green .th { fill: #173404; }
  .c-green .ts { fill: #3B6D11; }
</style>
</head>
<body>
<svg viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- 입력 -->
<text class="ts" x="340" y="22" text-anchor="middle" fill="#888">외부 입력 (데이터 스트림)</text>
<line x1="340" y1="28" x2="340" y2="48" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- Region layer label -->
<text class="ts" x="50" y="58" fill="#888">Region layer</text>

<!-- Region 1: 언어 -->
<g class="node c-purple">
  <rect x="30" y="65" width="130" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="95" y="90" text-anchor="middle" dominant-baseline="central" fill="#26215C">언어 영역</text>
  <text class="ts" x="95" y="110" text-anchor="middle" dominant-baseline="central" fill="#534AB7">HTPRuntime</text>
  <text class="ts" x="95" y="124" text-anchor="middle" dominant-baseline="central" fill="#534AB7">parse · classify</text>
</g>

<!-- Region 2: 기억 -->
<g class="node c-teal">
  <rect x="185" y="65" width="130" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="250" y="90" text-anchor="middle" dominant-baseline="central" fill="#04342C">기억 영역</text>
  <text class="ts" x="250" y="110" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">HTPRuntime</text>
  <text class="ts" x="250" y="124" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">store · recall</text>
</g>

<!-- Region 3: 감정 -->
<g class="node c-coral">
  <rect x="340" y="65" width="130" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="405" y="90" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">감정 영역</text>
  <text class="ts" x="405" y="110" text-anchor="middle" dominant-baseline="central" fill="#993C1D">HTPRuntime</text>
  <text class="ts" x="405" y="124" text-anchor="middle" dominant-baseline="central" fill="#993C1D">weight · priority</text>
</g>

<!-- Region 4: 감각 -->
<g class="node c-amber">
  <rect x="495" y="65" width="130" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="90" text-anchor="middle" dominant-baseline="central" fill="#412402">감각 영역</text>
  <text class="ts" x="560" y="110" text-anchor="middle" dominant-baseline="central" fill="#854F0B">HTPRuntime</text>
  <text class="ts" x="560" y="124" text-anchor="middle" dominant-baseline="central" fill="#854F0B">sensor · percept</text>
</g>

<!-- Region → Thalamus -->
<line x1="95"  y1="133" x2="240" y2="218" stroke="#534AB7" stroke-width="1" opacity=".5" marker-end="url(#arr)"/>
<line x1="250" y1="133" x2="280" y2="218" stroke="#0F6E56" stroke-width="1" opacity=".5" marker-end="url(#arr)"/>
<line x1="405" y1="133" x2="370" y2="218" stroke="#993C1D" stroke-width="1" opacity=".5" marker-end="url(#arr)"/>
<line x1="560" y1="133" x2="430" y2="218" stroke="#854F0B" stroke-width="1" opacity=".5" marker-end="url(#arr)"/>

<!-- Thalamus label -->
<text class="ts" x="50" y="210" fill="#888">Thalamus</text>

<!-- Thalamus block -->
<g class="node c-blue">
  <rect x="30" y="220" width="560" height="90" rx="12" stroke-width="1"/>
  <text class="th" x="310" y="248" text-anchor="middle" dominant-baseline="central" fill="#042C53">Thalamus</text>
  <text class="ts" x="310" y="268" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Core cells: 각 영역 내용 게이팅 · 특정 노드 활성화/억제</text>
  <text class="ts" x="310" y="285" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Matrix cells: 전체 상태 게이팅 · Winner-take-all 경쟁 조율</text>
  <text class="ts" x="310" y="302" text-anchor="middle" dominant-baseline="central" fill="#185FA5">과부하 감지 → NodeGenerationEngine 트리거 → 신경발생 신호</text>
</g>
<line x1="60" y1="258" x2="560" y2="258" stroke="#185FA5" stroke-width="0.3" opacity=".4"/>
<line x1="60" y1="275" x2="560" y2="275" stroke="#185FA5" stroke-width="0.3" opacity=".4"/>

<!-- Thalamus → PFC -->
<line x1="310" y1="310" x2="310" y2="350" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="330" y="335" fill="#888">압축 신호</text>

<!-- PFC label -->
<text class="ts" x="50" y="346" fill="#888">PFC</text>

<!-- PFC block -->
<g class="node c-gray">
  <rect x="30" y="353" width="560" height="76" rx="12" stroke-width="1"/>
  <text class="th" x="310" y="378" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">PFCRuntime (전전두엽)</text>
  <text class="ts" x="310" y="398" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">장기 목표 유지 · Top-down 억제 신호 · 최종 행동 결정</text>
  <text class="ts" x="310" y="415" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Working memory 버퍼 · 실행/억제 판단</text>
</g>

<!-- PFC → Action -->
<line x1="310" y1="429" x2="310" y2="460" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

<!-- Action output -->
<g class="node c-green">
  <rect x="200" y="462" width="220" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="310" y="484" text-anchor="middle" dominant-baseline="central" fill="#173404">행동 출력 (Action)</text>
</g>

<!-- Top-down feedback (right side) -->
<path d="M590 390 L625 390 L625 100 L626 100" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="5 3" marker-end="url(#arr2)"/>
<text class="ts" x="636" y="248" fill="#888">top-down</text>
<text class="ts" x="636" y="262" fill="#888">억제 신호</text>

<!-- Thalamus gate feedback (left side) -->
<path d="M30 260 L14 260 L14 100 L29 100" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr2)"/>
<text class="ts" x="16" y="180" fill="#185FA5">gate</text>

<!-- Legend -->
<rect x="30" y="530" width="580" height="72" rx="8" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="46" y="548" fill="#5F5E5A">범례</text>
<rect x="46" y="556" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="62" y="565" fill="#5F5E5A">RegionRuntime (HTPRuntime)</text>
<rect x="220" y="556" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="236" y="565" fill="#5F5E5A">Thalamus (게이팅·압축·트리거)</text>
<rect x="46" y="578" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="62" y="587" fill="#5F5E5A">PFCRuntime (최종 결정)</text>
<line x1="220" y1="583" x2="260" y2="583" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="266" y="587" fill="#5F5E5A">피드백 (top-down 억제)</text>
<line x1="400" y1="583" x2="440" y2="583" stroke="#534AB7" stroke-width="1" opacity=".5"/>
<text class="ts" x="446" y="587" fill="#5F5E5A">상향 신호 (bottom-up)</text>
</svg>
</body>
</html>
