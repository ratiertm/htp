<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thalamus Internal Design</title>
<style>
  body { margin: 0; background: #fff; font-family: sans-serif; }
  svg { display: block; width: 100%; height: auto; }
  .node { cursor: pointer; }
  .node:hover { opacity: 0.85; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-teal   > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-coral  > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-amber  > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-red    > rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-green  > rect { fill: #EAF3DE; stroke: #3B6D11; }
</style>
</head>
<body>
<svg viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="340" y="22" text-anchor="middle" fill="#1a1a1a">Thalamus 내부 설계</text>

<g class="c-purple">
  <rect x="30" y="38" width="90" height="34" rx="6" stroke-width="0.5"/>
  <text class="ts" x="75" y="55" text-anchor="middle" dominant-baseline="central" fill="#26215C">언어 Region</text>
</g>
<g class="c-teal">
  <rect x="138" y="38" width="90" height="34" rx="6" stroke-width="0.5"/>
  <text class="ts" x="183" y="55" text-anchor="middle" dominant-baseline="central" fill="#04342C">기억 Region</text>
</g>
<g class="c-coral">
  <rect x="246" y="38" width="90" height="34" rx="6" stroke-width="0.5"/>
  <text class="ts" x="291" y="55" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">감정 Region</text>
</g>
<g class="c-amber">
  <rect x="354" y="38" width="90" height="34" rx="6" stroke-width="0.5"/>
  <text class="ts" x="399" y="55" text-anchor="middle" dominant-baseline="central" fill="#412402">감각 Region</text>
</g>

<line x1="75"  y1="72" x2="140" y2="108" stroke="#534AB7" stroke-width="0.8" opacity=".6" marker-end="url(#ar)"/>
<line x1="183" y1="72" x2="210" y2="108" stroke="#0F6E56" stroke-width="0.8" opacity=".6" marker-end="url(#ar)"/>
<line x1="291" y1="72" x2="270" y2="108" stroke="#993C1D" stroke-width="0.8" opacity=".6" marker-end="url(#ar)"/>
<line x1="399" y1="72" x2="330" y2="108" stroke="#854F0B" stroke-width="0.8" opacity=".6" marker-end="url(#ar)"/>

<text class="ts" x="50" y="104" fill="#888">Core cells</text>
<g class="node c-blue">
  <rect x="30" y="110" width="280" height="88" rx="10" stroke-width="0.5"/>
  <text class="th" x="170" y="133" text-anchor="middle" dominant-baseline="central" fill="#042C53">Core 세포 (Content Gating)</text>
  <text class="ts" x="170" y="153" text-anchor="middle" dominant-baseline="central" fill="#185FA5">각 Region 출력 신호 수신</text>
  <text class="ts" x="170" y="170" text-anchor="middle" dominant-baseline="central" fill="#185FA5">허브 강도 × 발화율 → 활성화 점수</text>
  <text class="ts" x="170" y="186" text-anchor="middle" dominant-baseline="central" fill="#185FA5">특정 노드 ON/OFF 게이팅</text>
</g>

<text class="ts" x="340" y="104" fill="#888">Matrix cells</text>
<g class="node c-gray">
  <rect x="330" y="110" width="320" height="88" rx="10" stroke-width="0.5"/>
  <text class="th" x="490" y="133" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Matrix 세포 (State Gating)</text>
  <text class="ts" x="490" y="153" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">전체 Region 경쟁 신호 집계</text>
  <text class="ts" x="490" y="170" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Winner-take-all → 승자 Region 선택</text>
  <text class="ts" x="490" y="186" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">패자 Region 억제 신호 전송</text>
</g>

<line x1="170" y1="198" x2="170" y2="228" stroke="#185FA5" stroke-width="1" marker-end="url(#ar)"/>
<line x1="490" y1="198" x2="490" y2="228" stroke="#5F5E5A" stroke-width="1" marker-end="url(#ar)"/>
<path d="M170 228 L340 248" fill="none" stroke="#185FA5" stroke-width="0.8" marker-end="url(#ar)"/>
<path d="M490 228 L360 248" fill="none" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#ar)"/>

<g class="node c-blue">
  <rect x="200" y="250" width="280" height="56" rx="10" stroke-width="1"/>
  <text class="th" x="340" y="271" text-anchor="middle" dominant-baseline="central" fill="#042C53">Broadcast Hub</text>
  <text class="ts" x="340" y="291" text-anchor="middle" dominant-baseline="central" fill="#185FA5">승자 신호 → 전체 Region에 방송</text>
</g>

<line x1="340" y1="306" x2="340" y2="336" stroke="#185FA5" stroke-width="1" marker-end="url(#ar)"/>

<text class="ts" x="50" y="332" fill="#888">과부하 감지</text>

<g class="node c-red">
  <rect x="30" y="338" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="359" text-anchor="middle" dominant-baseline="central" fill="#501313">과부하 감지기</text>
  <text class="ts" x="130" y="379" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">Region 허브 강도 모니터링</text>
</g>

<g class="node c-gray">
  <rect x="250" y="338" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="359" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">PFC 전달</text>
  <text class="ts" x="340" y="379" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">저차원 압축 상태벡터</text>
</g>

<g class="node c-green">
  <rect x="450" y="338" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="359" text-anchor="middle" dominant-baseline="central" fill="#173404">NGE 트리거</text>
  <text class="ts" x="550" y="379" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">NRXN1 신호 → 신경발생</text>
</g>

<path d="M200 370 L230 370" fill="none" stroke="#A32D2D" stroke-width="1" marker-end="url(#ar)"/>
<path d="M430 370 L450 370" fill="none" stroke="#3B6D11" stroke-width="1" marker-end="url(#ar)"/>

<line x1="130" y1="394" x2="130" y2="430" stroke="#A32D2D" stroke-width="0.8" marker-end="url(#ar)"/>
<line x1="340" y1="394" x2="340" y2="430" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#ar)"/>
<line x1="550" y1="394" x2="550" y2="430" stroke="#3B6D11" stroke-width="0.8" marker-end="url(#ar)"/>

<g class="c-red">
  <rect x="50" y="432" width="160" height="44" rx="6" stroke-width="0.5"/>
  <text class="ts" x="130" y="449" text-anchor="middle" dominant-baseline="central" fill="#501313">억제 신호 발송</text>
  <text class="ts" x="130" y="465" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">→ 과부하 Region</text>
</g>

<g class="c-gray">
  <rect x="250" y="432" width="180" height="44" rx="6" stroke-width="0.5"/>
  <text class="ts" x="340" y="449" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">PFCRuntime 전달</text>
  <text class="ts" x="340" y="465" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">최종 판단 요청</text>
</g>

<g class="c-green">
  <rect x="470" y="432" width="160" height="44" rx="6" stroke-width="0.5"/>
  <text class="ts" x="550" y="449" text-anchor="middle" dominant-baseline="central" fill="#173404">새 노드 생성 명령</text>
  <text class="ts" x="550" y="465" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">→ 해당 Region NGE</text>
</g>

<rect x="30" y="494" width="620" height="52" rx="8" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="46" y="512" fill="#5F5E5A">생물학 대응</text>
<text class="ts" x="46" y="530" fill="#888">Core cells = 특정 시상핵 (VPM, dLGN 등)  /  Matrix cells = 중심매체·내측배측핵</text>
<text class="ts" x="46" y="544" fill="#888">NGE 트리거 = NRXN1 신호 → outer radial glia → 상위층 신경발생 (Thalamic NRXN1, bioRxiv 2025)</text>
</svg>
</body>
</html>
